# Rate limiting zones
limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=admin_limit:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=60r/m;

# Connection limiting (max 10 connections per IP)
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

server {
    listen 80;
    server_name expensebot.duckdns.org;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name expensebot.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/expensebot.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/expensebot.duckdns.org/privkey.pem;

    # Global connection limit
    limit_conn conn_limit 10;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Allow ACME challenges (Let's Encrypt cert renewal)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Block dotfiles and dot-directories (except .well-known)
    location ~ /\.(?!well-known/) {
        deny all;
    }

    # Block common backup/config artifacts by extension
    location ~* \.(env|sql|bak|backup|log|ini|cfg)$ {
        deny all;
    }

    # Webhook для бота
    location /webhook/ {
        limit_req zone=webhook_limit burst=10 nodelay;
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 10s;
        proxy_read_timeout 30s;
    }

    # Админка Django
    location /admin/ {
        limit_req zone=admin_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Остальные запросы
    location / {
        limit_req zone=general_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
