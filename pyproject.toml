[tool.black]
line-length = 120
target-version = ["py311"]
extend-exclude = '''
/(
    \.git
  | \.pytest_cache
  | __pycache__
  | venv
  | archive_.*
)/
'''

[tool.isort]
profile = "black"
line_length = 120
skip_gitignore = true
known_first_party = ["bot", "expense_bot", "expenses", "tests"]

[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = ["venv", "__pycache__", ".pytest_cache"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
pretty = true
show_error_codes = true
exclude = "(^venv/|^archive_)"
